<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Video Belajar</title>
    <link rel="stylesheet" href="../styles/authentication.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <img src="../images/logo.png" alt="Logo Video Belajar">
        </nav>
    </header>

    <main class="auth-card">
        <div class="welcome-message">
            <h1>Masuk ke Akun</h1>
            <p>Yuk, lanjutin belajarmu di videobelajar.</p>
        </div>

        <form action="../index.html" method="get">
            <div class="form-group">
                <label for="email">E-Mail <span class="required">*</span></label>
                <input class="form-input" type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="password">Kata Sandi <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input class="form-input" type="password" id="password" required>
                    <img src="../images/eye-off-icon.png" class="eye-icon" alt="">
                </div>
                <a href="#" class="lupa-password">Lupa Password?</a>
            </div>

            <div class="form-action">
                <button type="submit" class="btn btn-primary-default">Masuk</button>
                <a href="./register.html" class="btn btn-primary-100">Daftar</a>
            </div>
        </form>

            <div class="divider"><span>atau</span></div>

            <button type="button" class="btn btn-google">
                <img src="../images/google-icon.png" alt="">
                <span>Masuk dengan Google</span>
            </button>
        </form>
    </main>
</body>
</html>
